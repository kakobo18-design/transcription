trigger:
  branches:
    include:
      - main

variables:
  # Customize these
  azureSubscription: 'XXX'   # Name of your service connection
  dockerRegistryServiceConnection: 'XXXX' # For ACR login
  containerAppName: 'XXX'
  resourceGroup: 'XXX'
  acrRepo: 'XXX'
  buildId: $(Build.BuildId)
  imageTag: $(buildId)
  imageName: 'XXX.azurecr.io/demo:$(imageTag)'
  

stages:
  - stage: BuildAndPush
    displayName: Build and Push Docker Image
    jobs:
      - job: Build
        displayName: Build and Push
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: '$(dockerRegistryServiceConnection)'

          - task: Docker@2
            displayName: Build and Push Image
            inputs:
              command: buildAndPush
              repository: $(acrRepo)              # use full repo
              dockerfile: '**/Dockerfile'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(imageTag)

  - stage: Deploy
    displayName: Deploy to Azure Container Apps
    dependsOn: BuildAndPush
    jobs:
      - deployment: DeployToContainerApp
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Deploying image: $(imageName)"
                      az containerapp update \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --image $(imageName)