<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speech Translation Demo - BrushStroke AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  
</head>
<body>
  <h1>Speech Transcription Tool</h1>

  <div class="toolbar-row">
    <label for="recognitionLanguage" class="toolbar-label">Recognition language</label>
    <select id="recognitionLanguage" class="toolbar-select">
      <option value="en-US" selected>English (US)</option>
      <option value="es-ES">Spanish (Spain)</option>
      <option value="zh-CN">Mandarin Chinese (Simplified)</option>
      <option value="yue-HK">Cantonese</option>
      <option value="ja-JP">Japanese</option>
      <option value="ko-KR">Korean</option>
    </select>
  </div>

  <div class="ButtonConsoleDiv">
    <button id="startBtn" class="ButtonConsole">Start Transcription</button>
    <button id="stopBtn" class="ButtonConsole" disabled>Stop Transcription</button>
    <button id="downloadBtn" class="ButtonConsole">Download Log</button> <!-- 🆕 -->
  </div>

  <div class="lang-block">
    <h3>English</h3>
    <pre id="en"></pre>
  </div>

  <div class="lang-block">
    <h3>Spanish (Español)</h3>
    <pre id="es"></pre>
  </div>

  <div class="lang-block">
    <h3>Cantonese 粵語</h3>
    <pre id="yue"></pre>
  </div>
  
  <div class="lang-block">
    <h3>Mandarin 中文简体</h3>
    <pre id="zh"></pre>
  </div>
  
  
  <div class="lang-block">
    <h3>Japanese (日本語)</h3>
    <pre id="ja"></pre>
  </div>

  <div class="lang-block">
    <h3>Korean (한국어)</h3>
    <pre id="ko"></pre>
  </div>

  <!-- Support Scripts -->
  <script src="{{ url_for('static', filename='script/speechSDK.js') }}"></script>
  <script src="{{ url_for('static', filename='script/transcription.js') }}"></script>
    
  </script>
</body>
</html>
